
networks:
  internal:
    driver: bridge

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal
    # NOT exposed on host — no ports mapping
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  api:
    build: ./api
    restart: unless-stopped
    networks:
      - internal
    environment:
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  worker:
    build: ./worker
    restart: unless-stopped
    networks:
      - internal
    environment:
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  frontend:
    build: ./frontend
    restart: unless-stopped
    networks:
      - internal
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      API_URL: ${API_URL:-http://api:8000}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
