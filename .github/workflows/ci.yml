name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python (api)
        run: flake8 api/main.py api/tests/test_main.py --max-line-length=100

      - name: Lint Python (worker)
        run: flake8 worker/worker.py --max-line-length=100

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ESLint
        working-directory: frontend
        run: npm install --save-dev eslint @eslint/js

      - name: Lint JavaScript
        working-directory: frontend
        run: npx eslint app.js

      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        working-directory: api
        run: pytest tests/ -v --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set SHA output
        id: meta
        run: echo "sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build API image
        run: |
          docker build -t localhost:5000/api:${{ steps.meta.outputs.sha }} \
                       -t localhost:5000/api:latest ./api
          docker push localhost:5000/api:${{ steps.meta.outputs.sha }}
          docker push localhost:5000/api:latest

      - name: Build Worker image
        run: |
          docker build -t localhost:5000/worker:${{ steps.meta.outputs.sha }} \
                       -t localhost:5000/worker:latest ./worker
          docker push localhost:5000/worker:${{ steps.meta.outputs.sha }}
          docker push localhost:5000/worker:latest

      - name: Build Frontend image
        run: |
          docker build -t localhost:5000/frontend:${{ steps.meta.outputs.sha }} \
                       -t localhost:5000/frontend:latest ./frontend
          docker push localhost:5000/frontend:${{ steps.meta.outputs.sha }}
          docker push localhost:5000/frontend:latest

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build images for scan
        run: |
          docker build -t api:latest ./api
          docker build -t worker:latest ./worker
          docker build -t frontend:latest ./frontend

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Scan API image
        run: |
          trivy image --exit-code 1 --severity CRITICAL \
            --format sarif --output trivy-api.sarif api:latest

      - name: Scan Worker image
        run: |
          trivy image --exit-code 1 --severity CRITICAL \
            --format sarif --output trivy-worker.sarif worker:latest

      - name: Scan Frontend image
        run: |
          trivy image --exit-code 1 --severity CRITICAL \
            --format sarif --output trivy-frontend.sarif frontend:latest

      - name: Upload SARIF results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-reports
          path: "*.sarif"

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: cp .env.example .env

      - name: Build images
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Wait for frontend to be healthy
        run: |
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' \
              $(docker compose ps -q frontend) 2>/dev/null || echo "unknown")
            echo "Attempt $i: frontend health = $STATUS"
            [ "$STATUS" = "healthy" ] && break
            sleep 5
          done

      - name: Submit job and poll to completion
        run: |
          set -e
          RESPONSE=$(curl -sf -X POST http://localhost:3000/submit)
          echo "Submit response: $RESPONSE"
          JOB_ID=$(echo $RESPONSE | python3 -c \
            "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "Job ID: $JOB_ID"

          for i in $(seq 1 15); do
            STATUS_RESP=$(curl -sf http://localhost:3000/status/$JOB_ID)
            STATUS=$(echo $STATUS_RESP | python3 -c \
              "import sys,json; print(json.load(sys.stdin)['status'])")
            echo "Attempt $i: status = $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully!"
              exit 0
            fi
            sleep 2
          done

          echo "ERROR: Job did not complete in time"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy (Rolling Update)
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy rolling update
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "No deploy target configured, skipping deploy"
            exit 0
          fi
          echo "$DEPLOY_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            ${DEPLOY_USER}@${DEPLOY_HOST} << 'REMOTE'
          set -e
          cd ~/hng14-stage2-devops
          git pull origin main
          docker compose up -d --build --no-deps api
          for i in $(seq 1 12); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' \
              $(docker compose ps -q api) 2>/dev/null || echo "unknown")
            echo "API health check $i/12: $STATUS"
            [ "$STATUS" = "healthy" ] && break
            [ $i -eq 12 ] && echo "Deploy failed" && exit 1
            sleep 5
          done
          docker compose up -d --build --no-deps worker
          docker compose up -d --build --no-deps frontend
          echo "Deploy complete"
          REMOTE
